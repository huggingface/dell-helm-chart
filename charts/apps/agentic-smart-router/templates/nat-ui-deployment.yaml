{{- if .Values.natUi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nat-ui-deployment
  labels:
{{ include "aiStack.componentLabels" (dict "component" "nat-ui" "root" .) | nindent 4 }}
spec:
  replicas: {{ .Values.natUi.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: nat-ui
  strategy:
    type: {{ .Values.natUi.strategy.type }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nat-ui
    spec:
      containers:
        - name: nat-ui
          image: "{{ .Values.images.natUi }}"
          imagePullPolicy: {{ .Values.pullPolicy }}
          command:
{{ toYaml .Values.natUi.command | nindent 12 }}
          args:
{{ toYaml .Values.natUi.args | nindent 12 }}
          workingDir: {{ .Values.natUi.workingDir | quote }}
          env:
            - name: NAT_BACKEND_URL
              value: {{ .Values.natUi.env.NAT_BACKEND_URL | quote }}
            - name: NODE_ENV
              value: {{ .Values.natUi.env.NODE_ENV | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.natUi.containerPort }}
              protocol: TCP
          {{- if and .Values.natUi.livenessProbe .Values.natUi.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
{{ toYaml .Values.natUi.livenessProbe.exec.command | nindent 16 }}
            failureThreshold: {{ .Values.natUi.livenessProbe.failureThreshold }}
            initialDelaySeconds: {{ .Values.natUi.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.natUi.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.natUi.livenessProbe.timeoutSeconds }}
          {{- end }}
{{- end }}