{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llama-vision.frontend.name" . }}
  labels:
    {{- include "llama-vision.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "llama-vision.frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llama-vision.frontend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - name: gradio
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
        ports:
        - containerPort: 7860
          name: http
        env:
        - name: TGI_URL
          value: {{ include "llama-vision.tgiUrl" . | quote }}
        resources:
          {{- toYaml .Values.frontend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
{{- end }}
