# DB credentials
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-credentials
  labels:
    {{- include "sa.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  POSTGRES_DB: "code_analyzer"
  DATABASE_URL: "postgresql://postgres:{{ .Values.secrets.dbPassword }}@{{ include "sa.postgresName" . }}:5432/code_analyzer"
---
# LLM API keys + Admin key
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-keys
  labels:
    {{- include "sa.labels" . | nindent 4 }}
type: Opaque
stringData:
  CODE_ANALYZER_API_KEY: {{ .Values.secrets.analyzerApiKey | quote }}
  CODE_FIXER_API_KEY: {{ .Values.secrets.fixerApiKey | quote }}
  CODE_CHAT_API_KEY: {{ .Values.secrets.chatApiKey | quote }}
  ADMIN_API_KEY: {{ .Values.secrets.adminApiKey | quote }}
---
{{- if not .Values.jwt.existingSecret }}
# JWT RSA key pair — only created if existingSecret is not set
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-jwt-keys
  labels:
    {{- include "sa.labels" . | nindent 4 }}
type: Opaque
data:
  jwt_private.pem: {{ .Values.secrets.jwtPrivateKey | quote }}
  jwt_public.pem: {{ .Values.secrets.jwtPublicKey | quote }}
{{- end }}
