# =============================================================================
# Super Analyzer — values.yaml
# Put secrets in secrets.yaml (gitignored)
# =============================================================================

# --- API image ---
image:
  repository: "registry.dell.huggingface.co/super-analyzer"
  tag: "1.0.5"
  pullPolicy: Always

secrets:
  dbPassword: "CHANGE_ME"
  jwtPrivateKey: ""
  jwtPublicKey: ""

  adminApiKey: "CHANGE_ME"
  analyzerApiKey: "not-needed"
  fixerApiKey: "not-needed"
  chatApiKey: "not-needed"    # your Nvidia API key

replicaCount: 1

# --- Service ---
service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

# --- LLM endpoints (non-secret) ---
llm:
  defaultModel: "openai/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-BF16"
  defaultApiBase: "http://1.2.3.4:8001/v1"
  analyzerModel: ""
  analyzerApiBase: ""
  fixerModel: ""
  fixerApiBase: ""
  chatModel: ""
  chatApiBase: ""

# --- App settings ---
config:
  AUTH_REQUIRED: "false"
  CODE_ANALYZER_USE_FIM: "false"
  CODE_ANALYZER_MAX_FILE_LINES: "2000"
  CODE_ANALYZER_EXTENDED_THINKING: "false"
  CODE_ANALYZER_CRITIC_THINKING_BUDGET: "0"
  CODE_ANALYZER_GUARDIAN_THINKING_BUDGET: "0"
  CODE_ANALYZER_DISABLE_CRITIC: "false"
  JWT_PRIVATE_KEY_FILE: "/app/keys/jwt_private.pem"
  JWT_PUBLIC_KEY_FILE: "/app/keys/jwt_public.pem"
  JWT_EXPIRE_HOURS: "24"

# --- JWT keys ---
# Set existingSecret to use a pre-created secret (recommended)
# Leave empty to let Helm create it from secrets.jwtPrivateKey/jwtPublicKey
jwt:
  existingSecret:

# --- Postgres ---
postgres:
  image: "postgres:16-alpine"
  persistence:
    storageClass: "local-path"
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

# --- API resources ---
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "2"
    memory: 2Gi

nodeSelector: {}
tolerations: []
